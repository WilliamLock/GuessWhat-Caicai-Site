<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GuessWhat? 猜-猜</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6eedf;
      color: #1d1b18;
    }
    main {
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: 56px 24px 64px;
    }
    h1 {
      font-size: clamp(42px, 8vw, 82px);
      line-height: 0.98;
      margin: 0 0 18px;
      color: #d51f1b;
    }
    p { font-size: 19px; line-height: 1.6; }
    a { color: #2f7d68; font-weight: 700; }
    nav { display: flex; gap: 20px; margin-top: 28px; flex-wrap: wrap; }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 0.86fr) minmax(320px, 1.14fr);
      gap: 36px;
      align-items: center;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
      margin-top: 42px;
    }
    .eyebrow {
      margin: 0 0 10px;
      color: #6a6258;
      font-size: 18px;
      font-weight: 700;
    }
    .intro {
      max-width: 560px;
      color: #4d4740;
      font-size: 21px;
    }
    .screenshot {
      display: block;
      width: 100%;
      border: 1px solid #ded4c5;
      border-radius: 8px;
      box-shadow: 0 22px 54px rgba(64, 46, 28, 0.16);
    }
    @media (max-width: 820px) {
      main { padding-top: 42px; }
      .hero { grid-template-columns: 1fr; gap: 28px; }
      .gallery { grid-template-columns: 1fr; margin-top: 28px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div>
        <p class="eyebrow">中文聚会猜词游戏</p>
        <h1>GuessWhat?<br>猜-猜</h1>
        <p class="intro">选一个牌组，举起手机，和朋友一起用提示、动作和默契抢时间猜答案。答对向前倾，跳过向后倾，动作完成后自动换下一张。</p>
        <nav>
          <a href="https://www.producthunt.com/products/guesswhat-2?launch=guesswhat-2">Product Hunt Launch</a>
          <a href="support.html">支持</a>
          <a href="privacy.html">隐私政策</a>
        </nav>
      </div>
      <img class="screenshot" src="assets/introduction-screenshot.png" alt="GuessWhat? 猜-猜玩法介绍截图，展示答对向前倾、跳过向后倾的手势说明。">
    </section>
    <section class="gallery" aria-label="应用截图">
      <img class="screenshot" src="assets/category-selection.png" alt="GuessWhat? 猜-猜牌组选择页面截图，展示动物世界、中国美食、成语挑战和三国人物牌组。">
      <img class="screenshot" src="assets/game-card-wide.png" alt="GuessWhat? 猜-猜游戏页面截图，展示计时器和大号中文词卡。">
    </section>
  </main>
</body>
</html>
